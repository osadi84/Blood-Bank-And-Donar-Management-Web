<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - LifeFlow Blood Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css"> <!-- Use your existing styles -->
</head>
<body>
    <!-- Top Bar and Sidebar same as dashboard (reuse them or link them) -->
    <div class="top-bar bg-dark text-white py-2">
        <!-- Top bar content (same as dashboard) -->
    </div>

    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar same as dashboard -->
            <div class="col-lg-2 col-md-3 sidebar d-none d-md-block">
                <!-- Sidebar content (same as dashboard) -->
            </div>

            <!-- Main Profile Content -->
            <div class="col-lg-10 col-md-9">
                <div class="dashboard-header">
                    <div class="container">
                        <div class="row align-items-center">
                            <div class="col-md-8">
                                <h2 class="fw-bold mb-1">My Profile</h2>
                                <p class="text-muted mb-0" id="profileUpdateInfo">Last updated: Loading...</p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="container py-4">
                    <div class="card border-0 shadow-sm mb-4">
                        <div class="card-header bg-white border-0 py-3">
                            <h5 class="fw-bold mb-0">Personal Information</h5>
                        </div>
                        <div class="card-body">
                            <div class="row">
                                <div class="col-md-6">
                                    <p><strong>Full Name:</strong> <span id="profileFullName">Loading...</span></p>
                                    <p><strong>Username:</strong> <span id="profileUsername">Loading...</span></p>
                                    <p><strong>Email:</strong> <span id="profileEmail">Loading...</span></p>
                                    <p><strong>Phone:</strong> <span id="profilePhone">Loading...</span></p>
                                </div>
                                <div class="col-md-6">
                                    <p><strong>Blood Type:</strong> <span id="profileBloodType">Loading...</span></p>
                                    <p><strong>NIC:</strong> <span id="profileNIC">Loading...</span></p>
                                    <p><strong>City:</strong> <span id="profileCity">Loading...</span></p>
                                    <p><strong>District:</strong> <span id="profileDistrict">Loading...</span></p>
                                </div>
                            </div>
                            <div class="text-center mt-4">
                                <button class="btn btn-danger" onclick="editProfile()">Edit Profile</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div> <!-- Main content end -->
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID",
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let userData = null;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                await loadUserData(user.uid);
            } else {
                window.location.href = 'login.html';
            }
        });

        async function loadUserData(uid) {
            try {
                const userDoc = await getDoc(doc(db, 'donors', uid));
                if (userDoc.exists()) {
                    userData = userDoc.data();
                    updateProfileUI();
                } else {
                    alert('No user data found!');
                }
            } catch (error) {
                console.error('Error loading profile:', error);
            }
        }

        function updateProfileUI() {
            if (!userData) return;
            document.getElementById('profileFullName').textContent = `${userData.firstName} ${userData.lastName}`;
            document.getElementById('profileUsername').textContent = userData.username;
            document.getElementById('profileEmail').textContent = userData.email;
            document.getElementById('profilePhone').textContent = userData.phone;
            document.getElementById('profileBloodType').textContent = userData.bloodType;
            document.getElementById('profileNIC').textContent = userData.nic;
            document.getElementById('profileCity').textContent = userData.city;
            document.getElementById('profileDistrict').textContent = userData.district;
            document.getElementById('profileUpdateInfo').textContent = `Last updated: ${new Date().toLocaleDateString()}`;
        }

        function editProfile() {
            // Redirect to profile edit page
            window.location.href = 'edit-profile.html';
        }
    </script>
</body>
</html>
